version: '3'

x-rmatics-env: &rmatics-env
  FLASK_ENV: development
  PYTHONPATH: /code
  FLASK_APP: wsgi:application
  SECRET_KEY: test-secret
  URL_ENCODER_ALPHABET: abcdefg
  SQLALCHEMY_DATABASE_URI: mysql+pymysql://rmatics:dbpassword@ejudge-server:3306/pynformatics
  MONGO_URI: mongodb://ejudge-server:27017/pynformatics
  REDIS_URL: redis://rmatics:dbpassword@ejudge-server:6379/0
  # ---- ejudge integration (point these at your ejudge) ----
  EJUDGE_NEW_CLIENT_URL: http://172.17.0.1/cgi-bin/new-client
  EJUDGE_NEW_MASTER_URL: http://172.17.0.1/cgi-bin/new-master
  EJUDGE_MASTER_TOKEN: AQAAXud0OmWugwNNeCwQN8LSP801SFHyu4a21GmqpmdV-Zw
  # Optional multi-judge config; leave unset for a single ejudge:
  JUDGES_CONFIG_PATH: /code/deploy/judges.json
  DEFAULT_JUDGE_ID: 1
  # Notification
  EJUDGE_NOTIFY_STREAM: ejudge.notify
  EJUDGE_NOTIFY_GROUP: rmatics
  EJUDGE_NOTIFY_JUDGE_ID: 1
  # Centrifugo is optional for testing; failures are swallowed:
  CENTRIFUGO_URL: http://localhost:1377
  CENTRIFUGO_API_KEY: foo

services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: rmatics:local
    environment: *rmatics-env
    ports:
      - "12345:12345"
    command: flask run --host 0.0.0.0 --port 12345 --no-reload

  submit-worker:
    image: rmatics:local
    environment: *rmatics-env
    command: python /code/rmatics/scripts/submit_workers.py --workers 2

  notify-worker:
    image: rmatics:local
    environment: *rmatics-env
    command: python /code/rmatics/scripts/notify_workers.py --workers 2

